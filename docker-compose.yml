version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: dreamsync-postgres
    environment:
      POSTGRES_DB: dreamsync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Samriddhi27#
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: dreamsync-app
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dreamsync
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Samriddhi27#

volumes:
  postgres_data: